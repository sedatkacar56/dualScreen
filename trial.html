<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DualScreen Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      overflow: hidden;
      width: 100vw; height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    #canvas {
      position: absolute; inset: 0; overflow: hidden;
      cursor: grab;
    }
    #canvas.dragging { cursor: grabbing; }
    #stage {
      position: absolute; top: 0; left: 0;
      width: 0; height: 0;
      transform-origin: 0 0;
    }
    #world {
      position: absolute;
      top: 0; left: 0;
      width: 6000px; height: 1200px;
    }

    /* Road */
    .road {
      position: absolute;
      top: 500px; left: 0;
      width: 6000px; height: 80px;
      background: #333;
      border-top: 4px solid #555;
      border-bottom: 4px solid #555;
    }
    .road-line {
      position: absolute;
      top: 536px;
      height: 8px;
      width: 60px;
      background: #ffcc00;
      border-radius: 4px;
    }

    /* Buildings */
    .building {
      position: absolute;
      bottom: 0;
      border-radius: 4px 4px 0 0;
    }
    .buildings-row {
      position: absolute;
      top: 200px; left: 0;
      width: 6000px; height: 300px;
    }

    /* Moving car */
    .car {
      position: absolute;
      top: 505px;
      width: 120px; height: 50px;
      animation: drive 12s linear infinite;
    }
    .car-body {
      position: absolute;
      bottom: 0;
      width: 120px; height: 30px;
      background: #e94560;
      border-radius: 8px;
    }
    .car-top {
      position: absolute;
      bottom: 25px;
      left: 25px;
      width: 70px; height: 25px;
      background: #c73650;
      border-radius: 8px 8px 0 0;
    }
    .car-window {
      position: absolute;
      bottom: 28px;
      width: 28px; height: 18px;
      background: #87ceeb;
      border-radius: 4px;
    }
    .wheel {
      position: absolute;
      bottom: -8px;
      width: 20px; height: 20px;
      background: #222;
      border-radius: 50%;
      border: 3px solid #888;
    }

    /* Second car going opposite */
    .car2 {
      position: absolute;
      top: 530px;
      width: 100px; height: 45px;
      animation: driveBack 15s linear infinite;
    }
    .car2-body {
      position: absolute;
      bottom: 0;
      width: 100px; height: 28px;
      background: #4ecdc4;
      border-radius: 8px;
    }
    .car2-top {
      position: absolute;
      bottom: 23px;
      left: 20px;
      width: 60px; height: 22px;
      background: #3db8b0;
      border-radius: 8px 8px 0 0;
    }

    @keyframes drive {
      0%   { left: -200px; }
      100% { left: 6000px; }
    }
    @keyframes driveBack {
      0%   { left: 6000px; }
      100% { left: -200px; }
    }

    /* Stars */
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* Moon */
    .moon {
      position: absolute;
      top: 60px; left: 2800px;
      width: 100px; height: 100px;
      background: #fffde7;
      border-radius: 50%;
      box-shadow: 0 0 40px #fffde7, 0 0 80px rgba(255,253,231,0.3);
    }

    /* Airplane */
    .plane {
      position: absolute;
      top: 120px;
      font-size: 40px;
      animation: fly 18s linear infinite;
    }
    @keyframes fly {
      0%   { left: -100px; }
      100% { left: 6000px; }
    }
    .plane-trail {
      position: absolute;
      top: 138px;
      height: 3px;
      background: linear-gradient(to left, rgba(255,255,255,0.4), transparent);
      width: 300px;
      animation: flyTrail 18s linear infinite;
    }
    @keyframes flyTrail {
      0%   { left: -400px; }
      100% { left: 5700px; }
    }

    /* Flowing river under road */
    .river {
      position: absolute;
      top: 600px; left: 0;
      width: 6000px; height: 60px;
      background: linear-gradient(90deg, #1a3a5c, #2471a3, #1a3a5c, #2471a3, #1a3a5c, #2471a3);
      background-size: 2000px 100%;
      animation: flow 8s linear infinite;
    }
    @keyframes flow {
      0%   { background-position: 0 0; }
      100% { background-position: 2000px 0; }
    }

    /* Grass */
    .grass {
      position: absolute;
      top: 660px; left: 0;
      width: 6000px; height: 540px;
      background: #1a472a;
    }

    /* Trees */
    .tree-trunk {
      position: absolute;
      width: 14px;
      background: #5d4037;
      border-radius: 2px;
    }
    .tree-top {
      position: absolute;
      background: #2e7d32;
      border-radius: 50%;
    }

    /* Arrow hint */
    .arrow-hint {
      position: absolute;
      top: 750px;
      left: 2700px;
      font-size: 22px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    /* Monitor labels */
    .monitor-label {
      position: absolute;
      top: 30px;
      padding: 10px 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 30px;
      font-size: 14px;
      color: #aaa;
    }

    /* Shooting star */
    .shooting-star {
      position: absolute;
      width: 80px; height: 2px;
      background: linear-gradient(to left, white, transparent);
      animation: shoot 6s linear infinite;
      opacity: 0;
    }
    @keyframes shoot {
      0%   { left: 1000px; top: 50px; opacity: 0; }
      5%   { opacity: 1; }
      15%  { left: 600px; top: 200px; opacity: 0; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<div id="canvas">
  <div id="stage">
    <div id="world">

      <!-- Sky gradient -->
      <div style="position:absolute; top:0; left:0; width:6000px; height:660px;
           background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 40%, #2a1a3e 70%, #0a0a14 100%);">
      </div>

      <!-- Stars -->
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          const world = document.getElementById('world');
          for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 6000 + 'px';
            star.style.top = Math.random() * 400 + 'px';
            star.style.animationDelay = Math.random() * 2 + 's';
            world.appendChild(star);
          }
        });
      </script>

      <!-- Moon -->
      <div class="moon"></div>

      <!-- Shooting star -->
      <div class="shooting-star"></div>

      <!-- Airplane flying across both monitors -->
      <div class="plane">✈️</div>
      <div class="plane-trail"></div>

      <!-- Monitor labels -->
      <div class="monitor-label" style="left: 800px;">🖥️ Monitor 1</div>
      <div class="monitor-label" style="left: 2800px;">🖥️ Monitor 2</div>
      <div class="monitor-label" style="left: 4800px;">🖥️ Monitor 3</div>

      <!-- Buildings spanning both monitors -->
      <div class="buildings-row">
        <div class="building" style="left:100px; width:60px; height:180px; background:#1a237e;"></div>
        <div class="building" style="left:180px; width:80px; height:250px; background:#283593;"></div>
        <div class="building" style="left:280px; width:50px; height:150px; background:#1565c0;"></div>
        <div class="building" style="left:360px; width:90px; height:280px; background:#1a237e;"></div>
        <div class="building" style="left:480px; width:70px; height:200px; background:#283593;"></div>
        <div class="building" style="left:580px; width:55px; height:160px; background:#1565c0;"></div>
        <div class="building" style="left:670px; width:85px; height:230px; background:#1a237e;"></div>
        <div class="building" style="left:790px; width:65px; height:190px; background:#283593;"></div>
        <div class="building" style="left:890px; width:75px; height:270px; background:#1565c0;"></div>
        <div class="building" style="left:1000px; width:60px; height:170px; background:#1a237e;"></div>
        <div class="building" style="left:1100px; width:80px; height:240px; background:#283593;"></div>
        <div class="building" style="left:1210px; width:55px; height:150px; background:#1565c0;"></div>
        <div class="building" style="left:1310px; width:90px; height:290px; background:#1a237e;"></div>
        <div class="building" style="left:1430px; width:70px; height:210px; background:#283593;"></div>
        <div class="building" style="left:1540px; width:65px; height:180px; background:#1565c0;"></div>
        <div class="building" style="left:1640px; width:85px; height:260px; background:#1a237e;"></div>
        <div class="building" style="left:1760px; width:60px; height:170px; background:#283593;"></div>
        <div class="building" style="left:1860px; width:75px; height:230px; background:#1565c0;"></div>
        <div class="building" style="left:1970px; width:80px; height:280px; background:#1a237e;"></div>
        <div class="building" style="left:2080px; width:55px; height:160px; background:#283593;"></div>
        <div class="building" style="left:2180px; width:90px; height:250px; background:#1565c0;"></div>
        <div class="building" style="left:2300px; width:65px; height:190px; background:#1a237e;"></div>
        <div class="building" style="left:2400px; width:80px; height:270px; background:#283593;"></div>
        <div class="building" style="left:2520px; width:70px; height:200px; background:#1565c0;"></div>
        <div class="building" style="left:2630px; width:85px; height:240px; background:#1a237e;"></div>
        <div class="building" style="left:2750px; width:60px; height:180px; background:#283593;"></div>
        <div class="building" style="left:2850px; width:75px; height:260px; background:#1565c0;"></div>
        <div class="building" style="left:2960px; width:80px; height:220px; background:#1a237e;"></div>
        <div class="building" style="left:3080px; width:55px; height:170px; background:#283593;"></div>
        <div class="building" style="left:3180px; width:90px; height:290px; background:#1565c0;"></div>
        <div class="building" style="left:3310px; width:65px; height:200px; background:#1a237e;"></div>
        <div class="building" style="left:3420px; width:80px; height:250px; background:#283593;"></div>
        <div class="building" style="left:3540px; width:70px; height:180px; background:#1565c0;"></div>
        <div class="building" style="left:3650px; width:85px; height:270px; background:#1a237e;"></div>
        <div class="building" style="left:3770px; width:60px; height:210px; background:#283593;"></div>
        <div class="building" style="left:3870px; width:75px; height:240px; background:#1565c0;"></div>
      </div>

      <!-- Building windows (lights) -->
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          const buildings = document.querySelectorAll('.building');
          buildings.forEach(b => {
            const w = parseInt(b.style.width);
            const h = parseInt(b.style.height);
            for (let row = 15; row < h - 15; row += 25) {
              for (let col = 10; col < w - 10; col += 18) {
                if (Math.random() > 0.4) {
                  const win = document.createElement('div');
                  win.style.cssText = `position:absolute; left:${col}px; top:${row}px; width:10px; height:14px; background:${Math.random() > 0.5 ? '#ffd54f' : '#fff9c4'}; opacity:${Math.random() * 0.5 + 0.3}; border-radius:1px;`;
                  b.appendChild(win);
                }
              }
            }
          });
        });
      </script>

      <!-- Road -->
      <div class="road"></div>

      <!-- Road lines -->
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          const world = document.getElementById('world');
          for (let x = 0; x < 6000; x += 100) {
            const line = document.createElement('div');
            line.className = 'road-line';
            line.style.left = x + 'px';
            world.appendChild(line);
          }
        });
      </script>

      <!-- Red car driving left to right -->
      <div class="car">
        <div class="car-top"></div>
        <div class="car-window" style="left:30px;"></div>
        <div class="car-window" style="left:62px;"></div>
        <div class="car-body"></div>
        <div class="wheel" style="left:15px;"></div>
        <div class="wheel" style="left:85px;"></div>
      </div>

      <!-- Teal car driving right to left -->
      <div class="car2">
        <div class="car2-top"></div>
        <div class="car2-body"></div>
        <div class="wheel" style="left:12px; bottom:-8px; width:18px; height:18px; background:#222; border-radius:50%; border:3px solid #888; position:absolute;"></div>
        <div class="wheel" style="left:70px; bottom:-8px; width:18px; height:18px; background:#222; border-radius:50%; border:3px solid #888; position:absolute;"></div>
      </div>

      <!-- River -->
      <div class="river"></div>

      <!-- Grass -->
      <div class="grass"></div>

      <!-- Trees on grass -->
      <script>
        document.addEventListener('DOMContentLoaded', () => {
          const world = document.getElementById('world');
          for (let x = 50; x < 6000; x += Math.random() * 200 + 100) {
            const h = Math.random() * 40 + 30;
            const trunk = document.createElement('div');
            trunk.className = 'tree-trunk';
            trunk.style.cssText = `left:${x}px; top:${680 - h}px; height:${h}px;`;
            world.appendChild(trunk);

            const top = document.createElement('div');
            top.className = 'tree-top';
            const s = Math.random() * 30 + 30;
            top.style.cssText = `left:${x - s/2 + 7}px; top:${680 - h - s + 10}px; width:${s}px; height:${s}px;`;
            world.appendChild(top);
          }
        });
      </script>

      <!-- Hint -->
      <div class="arrow-hint">
        ← This scene continues seamlessly across all your monitors →<br>
        <span style="font-size:14px;">Watch the car and plane travel from screen to screen!</span>
      </div>

    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const stage  = document.getElementById('stage');

  let tx = 200, ty = -100, tz = 1;
  let dragging = false;
  let lastX = 0, lastY = 0;

  function applyStage() {
    stage.style.transform = `translate(${tx}px,${ty}px) scale(${tz})`;
  }

  canvas.addEventListener('mousedown', e => {
    dragging = true;
    lastX = e.clientX; lastY = e.clientY;
    canvas.classList.add('dragging');
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx += e.clientX - lastX;
    ty += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    applyStage();
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    canvas.classList.remove('dragging');
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    tx = mx - (mx - tx) * delta;
    ty = my - (my - ty) * delta;
    tz *= delta;
    applyStage();
  }, { passive: false });

  applyStage();
</script>

</body>
</html>
