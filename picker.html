<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dual Screen — Choose File</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e12;
      color: #e0e0ee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }
    h1 { font-size: 22px; font-weight: 600; }
    p { font-size: 13px; color: #888; max-width: 400px; text-align: center; line-height: 1.5; }
    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn:hover { transform: scale(1.03); }
    .btn-primary {
      background: #7c6af5;
      color: white;
    }
    .btn-secondary {
      background: #1e1e2a;
      color: #aaa;
      border: 1px solid #333;
    }
    .buttons { display: flex; gap: 12px; margin-top: 10px; }
    #fileName {
      font-size: 13px;
      color: #4ecdc4;
      margin-top: 5px;
      min-height: 18px;
    }
    .url-row {
      display: flex;
      gap: 8px;
      width: 420px;
      margin-top: 6px;
    }
    .url-row input {
      flex: 1;
      background: #1e1e2a;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 10px 14px;
      color: #e0e0ee;
      font-size: 14px;
      outline: none;
    }
    .url-row input:focus { border-color: #7c6af5; }
    .url-row input::placeholder { color: #555; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 420px;
      color: #444;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #333;
    }
  </style>
</head>
<body>

  <h1>Dual Screen Viewer</h1>
  <p>Choose an HTML, video, image, or PDF file to display across your monitors, or use the built-in demo.</p>
  <p style="font-size:11px; color:#666;">HTML: pan/zoom syncs &nbsp;|&nbsp; Video: playback syncs &nbsp;|&nbsp; Image: pan/zoom syncs &nbsp;|&nbsp; PDF: native viewer</p>

  <div class="url-row">
    <input type="text" id="urlInput" placeholder="https://example.com — paste any website URL">
    <button class="btn btn-primary" id="urlBtn">Open</button>
  </div>

  <div class="divider">or choose a file</div>

  <div class="buttons">
    <button class="btn btn-primary" id="browseBtn">Browse File</button>
    <button class="btn btn-secondary" id="demoBtn">Use Demo</button>
  </div>
  <div id="fileName"></div>

<script>
  const { ipcRenderer } = require('electron');

  document.getElementById('browseBtn').addEventListener('click', () => {
    ipcRenderer.send('open-file-dialog');
  });

  ipcRenderer.on('file-chosen', (event, filePath) => {
    document.getElementById('fileName').textContent = filePath;
  });

  document.getElementById('demoBtn').addEventListener('click', () => {
    ipcRenderer.send('use-default');
  });

  document.getElementById('urlBtn').addEventListener('click', () => {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;
    const full = url.startsWith('http') ? url : 'https://' + url;
    ipcRenderer.send('open-url', full);
  });

  document.getElementById('urlInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('urlBtn').click();
  });
</script>

</body>
</html>
